###########################
# TIMEOUT DE INACTIVIDAD
###########################
[idle_timeout]
# Define el tiempo (600 segundos = 10 minutos) sin recibir comandos antes de actuar
timeout: 600
gcode:
    # Comprueba si la impresora está en estado de pausa
    {% if printer.pause_resume.is_paused %}
        # Si está pausada, NO apaga nada para no perder la posición, solo avisa
        {action_respond_info("Extrusor enfriado por pausa larga, pero motores mantenidos.")}
    {% else %}
        # Si no hay actividad y no está pausada:
        M84                      # Desactiva los motores (libera los ejes)
        TURN_OFF_HEATERS         # Apaga hotend y cama
        POWER_OFF_SAFE           # Llama a la macro de apagado seguro
    {% endif %}

###########################
# ENCENDER IMPRESORA (M80)
###########################
[gcode_macro M80]
description: "Envía señal al relé/enchufe inteligente para encender la impresora"
gcode:
    {action_respond_info("PRINTER_ON")}
    # Llama al método remoto de Moonraker (requiere configuración de [power] en moonraker.conf)
    {action_call_remote_method(
        "set_device_power",
        device="Ender-3-S1",
        state="on")}

###########################
# APAGAR IMPRESORA (M81)
###########################
[gcode_macro M81]
description: "Envía señal al relé/enchufe inteligente para apagar la impresora"
gcode:
    {action_respond_info("PRINTER_OFF")}
    # Llama al método remoto para cortar la corriente
    {action_call_remote_method(
        "set_device_power",
        device="Ender-3-S1",
        state="off")}

###########################
# APAGADO SEGURO (Lógica)
###########################
[gcode_macro POWER_OFF_SAFE]
description: "Inicia la secuencia de comprobación antes de apagar"
gcode:
    # Activa un temporizador de 1 segundos para empezar a revisar el estado
    UPDATE_DELAYED_GCODE ID=poweroff_safe_check DURATION=1

[delayed_gcode poweroff_safe_check]
description: "Bucle de seguridad para enfriamiento y estado de impresión"
gcode:
    # CASO 1: Si está imprimiendo o pausada, cancela el apagado por seguridad
    {% if printer.print_stats.state in ["printing", "paused"] %}
        {action_respond_info("⛔ Apagado cancelado: impresión en curso o pausada.")}
    
    # CASO 2: Si la impresora está en estado de error
    {% elif printer.print_stats.state == "error" %}
        {action_respond_info("⚠ Impresora en error, esperando enfriamiento...")}
        # Reintenta la comprobación cada minuto
        UPDATE_DELAYED_GCODE ID=poweroff_safe_check DURATION=60
    
    # CASO 3: Si el hotend está por encima de 50°C (evita atascos por calor ascendente)
    {% elif printer.extruder.temperature > 50 %}
        {action_respond_info("🔥 Impresora caliente, esperando enfriamiento...")}
        # Reintenta cada minuto hasta que baje de 50°C
        UPDATE_DELAYED_GCODE ID=poweroff_safe_check DURATION=60

    # CASO 4: Todo seguro, procede al apagado final
    {% else %}
        {action_respond_info("✅ Condiciones seguras alcanzadas. Apagando...")}
        M81                     # Llama a la macro de apagado físico
    {% endif %}
