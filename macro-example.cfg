###########################
# TIMEOUT DE INACTIVIDAD
###########################
[idle_timeout]
# 600s = 10 min de inactividad
timeout: 600
gcode:
  M84                          ; Apaga motores
  TURN_OFF_HEATERS             ; Apaga hotend y cama
  POWER_OFF_SAFE               ; Inicia apagado seguro

###########################
# ENCENDER IMPRESORA
###########################
[gcode_macro M80]
description: "Encender la impresora"
gcode:
  {action_respond_info("PRINTER_ON")}
  {action_call_remote_method(
      "set_device_power",
      device="Printer",
      state="on")}

###########################
# APAGADO SEGURO
###########################
[gcode_macro POWER_OFF_SAFE]
description: "Apagado seguro tras comprobar estado"
gcode:
  {% set state = printer.print_stats.state %}
  {% set temp_nozzle = printer.extruder.temperature %}
  
  {% if state in ["printing", "paused"] %}
    {action_respond_info("⛔ Apagado cancelado: impresión en curso o pausada.")}
  
  {% elif state == "error" %}
    {action_respond_info("⚠ Impresora en error, esperando enfriamiento...")}
    UPDATE_DELAYED_GCODE ID=poweroff_safe_check DURATION=30
  
  {% elif temp_nozzle > 50 %}
    UPDATE_DELAYED_GCODE ID=poweroff_safe_check DURATION=30

  {% else %}
    M81
  {% endif %}

###########################
# APAGAR IMPRESORA
###########################
[gcode_macro M81]
description: "Apagar la impresora"
gcode:
  {action_respond_info("PRINTER_OFF")}
  {action_call_remote_method(
      "set_device_power",
      device="Printer",
      state="off")}